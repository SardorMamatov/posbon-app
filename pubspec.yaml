name: posbon_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  archive: ^4.0.7
  crypto: ^3.0.7
  dio: ^5.9.0
  file_picker: ^11.0.2
  flutter_device_apps: ^0.6.0
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.0.0
  permission_handler: ^12.0.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/png/
    - assets/png/posbon.png
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/png/play_store_512.png"
  adaptive_icon_background: "#FFFFFF" 
  adaptive_icon_foreground: "assets/png/play_store_512.png" 
  adaptive_icon_foreground_inset: 0
  image_path_ios: "assets/png/play_store_512.png"
  background_color_ios: "#334652"
